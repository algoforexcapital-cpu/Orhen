<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | Orhen.site</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 50px;
            position: relative;
        }
        .auth-card {
            width: 100%;
            max-width: 450px;
            padding: 40px;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-switch {
            text-align: center;
            margin-top: 20px;
            color: var(--text-muted);
        }
        .auth-switch a {
            color: var(--neon-cyan);
            font-weight: 600;
        }
        #login-error {
            display: none;
            text-align: center;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 5px;
            font-size: 0.9rem;
            background: rgba(255, 0, 0, 0.1);
            color: #ff4444;
            border: 1px solid #ff4444;
        }
    </style>
</head>
<body>
    <div class="blob blob-1" style="background: var(--neon-purple);"></div>
    <div class="blob blob-2" style="background: var(--neon-pink);"></div>

    <!-- Navigation -->
    <header>
        <div class="container nav-container">
            <!-- Logo removed -->
            <div class="mobile-menu-btn">☰</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="signup.html" class="btn btn-secondary" style="padding: 8px 20px; font-size: 0.9rem;">Sign Up</a></li>
            </ul>
        </div>
    </header>

    <div class="auth-container">
        <div class="glass-card auth-card reveal">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p style="color: var(--text-muted);">Log in to your Orhen.site account</p>
            </div>
            
            <div id="login-error"></div>

            <form id="login-form">
                <div class="input-wrapper">
                    <input type="email" id="email" required pattern=".+@gmail\.com$" title="Please enter a valid @gmail.com address" placeholder=" ">
                    <label for="email">Email Address</label>
                </div>
                <div class="input-wrapper" style="margin-bottom: 30px;">
                    <div style="position: absolute; right: 0; top: -25px;">
                        <a href="#" style="font-size: 0.85rem; color: var(--neon-cyan); padding: 5px; position:relative; z-index: 10;">Forgot Password?</a>
                    </div>
                    <input type="password" id="password" required placeholder=" ">
                    <label for="password">Password</label>
                </div>
                <button type="submit" id="login-btn" class="btn btn-secondary" style="width: 100%;">Log In</button>
            </form>
            <div class="auth-switch">
                Don't have an account? <a href="signup.html">Sign Up</a>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>

    <!-- Firebase Auth Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // Corrected Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBFXsRCjJVNwIGGdWvXcz3mU2fUFHDwiIU",
            authDomain: "orihen-205c4.firebaseapp.com",
            projectId: "orihen-205c4",
            storageBucket: "orihen-205c4.firebasestorage.app",
            messagingSenderId: "717886720655",
            appId: "1:717886720655:web:b4e68488cc5c29e841befa",
            measurementId: "G-6L2DWW6RCD"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const loginForm = document.getElementById('login-form');
        const errorBox = document.getElementById('login-error');
        const submitBtn = document.getElementById('login-btn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorBox.style.display = 'none';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            submitBtn.innerText = 'Logging in...';
            
            submitBtn.disabled = true;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = "chatbot.html";
            } catch (error) {
                console.error("Login Error:", error.message);
                errorBox.innerText = "Invalid Email or Password!";
                errorBox.style.display = 'block';
                submitBtn.innerText = 'Log In';
                
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
